<!DOCTYPE html>
<html>
    <head>
        <title>Grafikon žanrova</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../style/grafikon.css">
        <link rel="stylesheet" href="../style/style.css">
    </head>
    <body>

        <header>
            <h1>GRAFIKON ŽANROVA</h1>
        </header>

        <nav>
            <div class="nav-container">
                <input type="checkbox" id="menu-toggle">

                <label for="menu-toggle" class="hamburger">☰</label>

                <div class="nav-links">
                    <a href="../index.html">NASLOVNA</a>
                    <a href="slike.html">SLIKE</a>
                </div>
            </div>
        </nav>

        <div class="chart-wrapper">

            <div class="chart bar-chart">
                <div class="bar rock" style="--value:7">Rock (7)</div>
                <div class="bar alternative" style="--value:5">Alternative (5)</div>
                <div class="bar rap" style="--value:3">Rap (3)</div>
                <div class="bar electronic" style="--value:2">Electronic (2)</div>
                <div class="bar metal" style="--value:1">Metal (1)</div>
                <div class="bar soul" style="--value:1">Soul (1)</div>
                <div class="bar dance" style="--value:1">Dance (1)</div>
                <div class="bar house" style="--value:1">House (1)</div>
            </div>

            <div class="pie-container">
                <div class="pie-chart">
                    <div class="slice rock" style="--start:0; --deg:126deg;"></div>
                    <div class="slice alternative" style="--start:126deg; --deg:91deg;"></div>
                    <div class="slice rap" style="--start:217deg; --deg:51deg;"></div>
                    <div class="slice electronic" style="--start:268deg; --deg:34deg;"></div>
                    <div class="slice metal" style="--start:302deg; --deg:17deg;"></div>
                    <div class="slice soul" style="--start:319deg; --deg:17deg;"></div>
                    <div class="slice dance" style="--start:336deg; --deg:17deg;"></div>
                    <div class="slice house" style="--start:353deg; --deg:17deg;"></div>
                </div>
                <div class="pie-legend">
                    <div><span class="legend-color rock"></span> Rock (7)</div>
                    <div><span class="legend-color alternative"></span> Alternative (5)</div>
                    <div><span class="legend-color rap"></span> Rap (3)</div>
                    <div><span class="legend-color electronic"></span> Electronic (2)</div>
                    <div><span class="legend-color metal"></span> Metal (1)</div>
                    <div><span class="legend-color soul"></span> Soul (1)</div>
                    <div><span class="legend-color dance"></span> Dance (1)</div>
                    <div><span class="legend-color house"></span> House (1)</div>
                </div>
            </div>

        </div>
    </body>
</html>

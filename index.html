        <h1>TABLICA GLAZBE</h1>

        <div class="filters">
            <select id="filter-genre">
                <option value="">Svi žanrovi</option>
                <option>Rock</option>
                <option>Pop</option>
                <option>Hip Hop</option>
            </select>
            <input type="number" id="filter-year" placeholder="Godina">
            <select id="filter-mood">
                <option value="">Sva raspoloženja</option>
                <option>Energetic</option>
                <option>Dramatic</option>
                <option>Dark</option>
                <option>Happy</option>
                <option>Melancholic</option>
                <option>Cheerful</option>
                <option>Powerful</option>
                <option>Aggressive</option>
                <option>Emotional</option>
                <option>Groovy</option>
                <option>Inspirational</option>
                <option>Passionate</option>
                <option>Relaxed</option>
                <option>Festive</option>
                <option>Determined</option>
                <option>Dreamy</option>
                <option>Intense</option>
                <option>Funky</option>
                <option>Danceable</option>
                <option>Anthemic</option>
                <option>Moody</option>
                <option>Confident</option>
                <option>Empowering</option>
                <option>Wild</option>
                <option>Romantic</option>
                <option>Serious</option>
                <option>Gritty</option>
                <option>Uplifting</option>
                <option>Summer Vibes</option>
            </select>
        </div>

        <div class="main">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Artist</th>
                        <th>Year</th>
                        <th>Genre</th>
                        <th>Mood</th>
                        <th>Akcija</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>

            <aside>
                <h2>Košarica</h2>

                <table>
                    <thead>
                        <tr>
                            <th>Izvođač</th>
                            <th>Pjesma</th>
                            <th>Godina</th>
                            <th>Žanr</th>
                            <th>Akcija</th>
                        </tr>
                    </thead>
                    <tbody id="cart-body"></tbody>
                </table>

                <button id="confirm-btn">Potvrdi odabir</button>

                <img src="images/daft-punk-discovery.png">
                <img src="images/toxicity-soad.jpg">
            </aside>

        </div>
